# Publishes the Vite `dist/` folder to the orphan branch `gh-pages`.
# In the repo: Settings → Pages → set Source to "Deploy from a branch",
# branch `gh-pages`, folder `/ (root)`. You do NOT need the "GitHub Actions"
# source option for this workflow to work.

name: Deploy behringdx.health

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "behringdx-health-pages"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install and build
        run: npm ci && npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
